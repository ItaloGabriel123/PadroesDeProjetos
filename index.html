<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sabor coletivo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🍳 Nosso site de receitas</h1>
</header>

<main>

    <section class="form-section">
        <h2 id="form-title">Adicionar Receita</h2>

        <input type="hidden" id="receita-id">

        <input type="text" id="titulo" placeholder="Título da receita">
        <textarea id="ingredientes" placeholder="Ingredientes"></textarea>
        <textarea id="modoPreparo" placeholder="Modo de preparo"></textarea>

        <button onclick="salvarReceita()">Salvar Receita</button>
    </section>

    <section class="lista-section">
        <h2>📋 Minhas Receitas</h2>
        <div id="lista-receitas"></div>
    </section>

</main>

<script src="script.js"></script>
</body>
</html>
