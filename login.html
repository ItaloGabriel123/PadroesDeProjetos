<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login - Sabor Coletivo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">
    <select id="tipo">
      <option value="usuario">Usuário Comum</option>
      <option value="nutricionista">Nutricionista</option>
    </select>
    <button onclick="login()">Entrar</button>

    <hr style="margin: 20px 0; border-color: #E6A800;">
    
    <h3>Criar Conta</h3>
    <input type="text" id="nomeCadastro" placeholder="Nome">
    <input type="email" id="emailCadastro" placeholder="Email">
    <input type="password" id="senhaCadastro" placeholder="Senha">
    <select id="tipoCadastro">
      <option value="usuario">Usuário Comum</option>
      <option value="nutricionista">Nutricionista</option>
    </select>
    <button onclick="criarConta()">Cadastrar</button>
  </div>

  <script src="login.js"></script>
</body>
</html>
